<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Portfolio 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --bg-color: #f8f8f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-sub: #666666;
            --accent: #222222;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 50px;
        }

        /* Header */
        header {
            max-width: 1200px;
            margin: 80px auto 60px;
            padding: 0 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        header p {
            font-size: 1.1rem;
            color: var(--text-sub);
            font-weight: 300;
        }

        /* Card Grid */
        .portfolio-grid {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: grid;
            gap: 30px;
            /* PC 2열 */
            grid-template-columns: repeat(2, 1fr);
        }

        /* Responsive Grid */
        @media (max-width: 992px) {
            .portfolio-grid { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
        }
        @media (max-width: 576px) {
            .portfolio-grid { grid-template-columns: 1fr; }
            header h1 { font-size: 1.8rem; }
        }

        /* Card Style */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        /* Thumbnail & Skeleton */
        .thumbnail-container {
            width: 100%;
            aspect-ratio: 16 / 10;
            background: #eee;
            position: relative;
            overflow: hidden;
        }

        .skeleton {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card-body {
            padding: 25px;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .card-author {
            font-size: 0.9rem;
            color: var(--text-sub);
            margin-bottom: 12px;
        }

        .card-desc {
            font-size: 0.95rem;
            color: var(--text-sub);
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            width: 90%;
            height: 90%;
            background: #fff;
            border-radius: 8px;
            position: relative;
            overflow-y: auto;
            padding: 20px;
        }

        .close-btn {
            position: fixed;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 40px;
            cursor: pointer;
            z-index: 1001;
        }

        /* PDF Viewer in Modal */
        .pdf-page-container {
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .pdf-page-container canvas {
            width: 100% !important;
            height: auto !important;
        }
    </style>
</head>
<body>

    <header>
        <h1>Marketing portfolio 2026</h1>
        <p>데이터를 치밀하게 분석하여 기획에 반영할 수 있는 스마트 마케터 여기있습니다!</p>
    </header>

    <main class="portfolio-grid">
        <div class="card" onclick="openModal('./copyyy.pdf')">
            <div class="thumbnail-container" id="thumb-container-1">
                <div class="skeleton"></div>
            </div>
            <div class="card-body">
                <div class="card-title">마케팅 포트폴리오 보고서</div>
                <div class="card-author">작성자 : 신현우</div>
                <div class="card-desc">마케팅 기획안 실습물 정리</div>
            </div>
        </div>
    </main>

    <div id="pdfModal" class="modal" onclick="closeModal(event)">
        <span class="close-btn" onclick="closeModal(event)">&times;</span>
        <div class="modal-content" id="modalContent" onclick="event.stopPropagation()">
            </div>
    </div>

    <script>
        // PDF.js 설정
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // 썸네일 렌더링 함수
        async function renderThumbnail(url, containerId) {
            try {
                const loadingTask = pdfjsLib.getDocument(url);
                const pdf = await loadingTask.promise;
                const page = await pdf.getPage(1);
                
                const viewport = page.getViewport({ scale: 0.5 });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                await page.render({ canvasContext: context, viewport: viewport }).promise;
                
                const container = document.getElementById(containerId);
                container.innerHTML = '';
                container.appendChild(canvas);
            } catch (error) {
                console.error('PDF 썸네일 로드 실패:', error);
            }
        }

        // 모달 열기 및 전체 페이지 렌더링
        async function openModal(url) {
            const modal = document.getElementById('pdfModal');
            const content = document.getElementById('modalContent');
            modal.style.display = 'flex';
            content.innerHTML = '<p style="text-align:center; padding:20px;">로딩 중...</p>';

            try {
                const loadingTask = pdfjsLib.getDocument(url);
                const pdf = await loadingTask.promise;
                content.innerHTML = ''; // 로딩 메시지 제거

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 1.5 });
                    
                    const pageContainer = document.createElement('div');
                    pageContainer.className = 'pdf-page-container';
                    
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                    pageContainer.appendChild(canvas);
                    content.appendChild(pageContainer);
                }
            } catch (error) {
                content.innerHTML = '<p style="text-align:center; color:red;">PDF를 불러올 수 없습니다.</p>';
            }
        }

        // 모달 닫기
        function closeModal(event) {
            document.getElementById('pdfModal').style.display = 'none';
            document.getElementById('modalContent').innerHTML = ''; // 메모리 해제
        }

        // ESC 키로 닫기
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // 페이지 로드 시 썸네일 실행
        window.onload = () => {
            renderThumbnail('./copyyy.pdf', 'thumb-container-1');
        };
    </script>
</body>
</html>
